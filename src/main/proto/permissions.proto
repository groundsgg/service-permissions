syntax = "proto3";

package gg.grounds.permissions.v1;

option java_multiple_files = true;
option java_package = "gg.grounds.grpc.permissions";

import "google/protobuf/timestamp.proto";

service PermissionSnapshotService {
  rpc GetPlayerSnapshot(GetPlayerSnapshotRequest) returns (PlayerPermissionSnapshot);
  rpc RefreshOnlinePlayers(RefreshOnlinePlayersRequest) returns (RefreshOnlinePlayersReply);
}

service PermissionCatalogService {
  rpc RegisterPermissionManifest(RegisterPermissionManifestRequest) returns (RegisterPermissionManifestReply);
}

message GetPlayerSnapshotRequest {
  string player_id = 1;
  reserved 2;
  reserved "keycloak_groups";
  string server_type = 3;
  string server_id = 4;
}

message RefreshOnlinePlayersRequest {
  string server_type = 1;
  string server_id = 2;
}

message RefreshOnlinePlayersReply {
  bool accepted = 1;
  string message = 2;
}

message PlayerPermissionSnapshot {
  string player_id = 1;
  int64 policy_version = 2;
  google.protobuf.Timestamp issued_at = 3;
  google.protobuf.Timestamp refresh_after = 4;
  google.protobuf.Timestamp expires_at = 5;
  repeated PermissionGrant allow_patterns = 6;
  repeated PermissionGrant deny_patterns = 7;
  repeated string role_keys = 8;
  repeated RoleMetadata role_metadata = 9;
}

message PermissionGrant {
  PermissionEffect effect = 1;
  string pattern = 2;
  PermissionScope scope = 3;
  PermissionGrantSource source = 4;
  google.protobuf.Timestamp expires_at = 5;
  PermissionGrantOrigin origin = 6;
}

message PermissionGrantOrigin {
  PermissionGrantOriginKind kind = 1;
  string role_key = 2;
  string mapping_id = 3;
  repeated string inherited_path = 4;
}

message PermissionScope {
  PermissionScopeKind kind = 1;
  string value = 2;
}

message RoleMetadata {
  string key = 1;
  string name = 2;
  string prefix = 3;
  string color = 4;
  int32 sort_order = 5;
}

message RegisterPermissionManifestRequest {
  string source = 1;
  string source_version = 2;
  string server_type = 3;
  string server_id = 4;
  repeated PermissionManifestEntry permissions = 5;
}

message PermissionManifestEntry {
  string key = 1;
  string label = 2;
  string description = 3;
  repeated PermissionScopeKind supported_scopes = 4;
}

message RegisterPermissionManifestReply {
  bool accepted = 1;
  string message = 2;
}

enum PermissionEffect {
  PERMISSION_EFFECT_UNSPECIFIED = 0;
  PERMISSION_EFFECT_ALLOW = 1;
  PERMISSION_EFFECT_DENY = 2;
}

enum PermissionScopeKind {
  PERMISSION_SCOPE_KIND_UNSPECIFIED = 0;
  PERMISSION_SCOPE_KIND_GLOBAL = 1;
  PERMISSION_SCOPE_KIND_SERVER_TYPE = 2;
  PERMISSION_SCOPE_KIND_SERVER = 3;
}

enum PermissionGrantSource {
  PERMISSION_GRANT_SOURCE_UNSPECIFIED = 0;
  PERMISSION_GRANT_SOURCE_ROLE = 1;
  PERMISSION_GRANT_SOURCE_PLAYER = 2;
}

enum PermissionGrantOriginKind {
  PERMISSION_GRANT_ORIGIN_KIND_UNSPECIFIED = 0;
  PERMISSION_GRANT_ORIGIN_KIND_DEFAULT_ROLE = 1;
  PERMISSION_GRANT_ORIGIN_KIND_DIRECT_ROLE = 2;
  PERMISSION_GRANT_ORIGIN_KIND_GROUP_MAPPING = 3;
  PERMISSION_GRANT_ORIGIN_KIND_DIRECT_PERMISSION = 4;
}
