quarkus.grpc.server.use-separate-server=false
quarkus.http.host=0.0.0.0
quarkus.http.port=9000
quarkus.http.auth.proactive=false
quarkus.log.level=${QUARKUS_LOG_LEVEL:INFO}

quarkus.datasource.db-kind=postgresql
quarkus.datasource.jdbc.url=${POSTGRES_URL:jdbc:postgresql://localhost:5432/app?currentSchema=permissions}
quarkus.datasource.username=${POSTGRES_USER:app}
quarkus.datasource.password=${POSTGRES_PASSWORD:app}
quarkus.flyway.schemas=permissions
quarkus.flyway.migrate-at-start=true

quarkus.application.name=service-permissions
quarkus.otel.sdk.disabled=${OTEL_SDK_DISABLED:true}
quarkus.otel.exporter.otlp.endpoint=${OTEL_EXPORTER_OTLP_ENDPOINT:http://alloy.observability.svc.cluster.local:4317}

%prod.mp.jwt.verify.issuer=${PERMISSIONS_JWT_ISSUER}
%prod.mp.jwt.verify.publickey.location=${PERMISSIONS_JWT_PUBLIC_KEY_LOCATION}
permissions.forge.base-url=${PERMISSIONS_FORGE_BASE_URL:http://localhost:8081}
