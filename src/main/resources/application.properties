quarkus.grpc.server.use-separate-server=false
quarkus.http.host=0.0.0.0
quarkus.http.port=9000
quarkus.http.auth.proactive=false
quarkus.log.level=${QUARKUS_LOG_LEVEL:INFO}

quarkus.datasource.db-kind=postgresql
quarkus.datasource.jdbc.url=${POSTGRES_URL:jdbc:postgresql://localhost:5432/app?currentSchema=permissions}
quarkus.datasource.username=${POSTGRES_USER:app}
quarkus.datasource.password=${POSTGRES_PASSWORD:app}
quarkus.flyway.schemas=permissions
quarkus.flyway.migrate-at-start=true

quarkus.application.name=service-permissions
quarkus.otel.sdk.disabled=${OTEL_SDK_DISABLED:true}
quarkus.otel.exporter.otlp.endpoint=${OTEL_EXPORTER_OTLP_ENDPOINT:http://alloy.observability.svc.cluster.local:4317}

%prod.mp.jwt.verify.issuer=${PERMISSIONS_JWT_ISSUER}
%prod.mp.jwt.verify.publickey.location=${PERMISSIONS_JWT_PUBLIC_KEY_LOCATION}
permissions.forge.base-url=${PERMISSIONS_FORGE_BASE_URL:http://localhost:8081}
quarkus.rest-client.keycloak-admin.url=${PERMISSIONS_KEYCLOAK_URL:http://localhost:8080}
permissions.keycloak.realm=${PERMISSIONS_KEYCLOAK_REALM:grounds}
permissions.keycloak.client-id=${PERMISSIONS_KEYCLOAK_CLIENT_ID:service-permissions}
permissions.keycloak.client-secret=${PERMISSIONS_KEYCLOAK_CLIENT_SECRET:}
permissions.identity-sync.page-size=${PERMISSIONS_IDENTITY_SYNC_PAGE_SIZE:100}
permissions.identity-sync.enabled=${PERMISSIONS_IDENTITY_SYNC_ENABLED:true}
permissions.identity-sync.schedule=${PERMISSIONS_IDENTITY_SYNC_SCHEDULE:30m}
permissions.identity-sync.max-staleness=${PERMISSIONS_IDENTITY_SYNC_MAX_STALENESS:6h}
permissions.identity-events.enabled=${PERMISSIONS_IDENTITY_EVENTS_ENABLED:true}
permissions.identity-events.nats-url=${PERMISSIONS_IDENTITY_EVENTS_NATS_URL:nats://localhost:4222}
permissions.identity-events.subject=${PERMISSIONS_IDENTITY_EVENTS_SUBJECT:minecraft-identity.changed}
permissions.identity-events.stream=${PERMISSIONS_IDENTITY_EVENTS_STREAM:MINECRAFT_IDENTITY}
permissions.identity-events.consumer-prefix=${PERMISSIONS_IDENTITY_EVENTS_CONSUMER_PREFIX:service-permissions}
permissions.identity-events.consumer=${PERMISSIONS_IDENTITY_EVENTS_CONSUMER:}

%test.permissions.keycloak.client-secret=test-secret
%test.permissions.identity-sync.enabled=false
%test.permissions.identity-events.enabled=false
