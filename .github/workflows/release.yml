name: Release

on:
  push:
    tags:
      # release-please config sets `include-component-in-tag: false`, so it now
      # cuts bare `v<semver>` tags. This workflow only listened for the old
      # component-prefixed shape, so it never fired for v0.4.0 — the release and
      # the Java build both went green while no versioned image was ever pushed
      # to ghcr, and every platform-bundle provision then died on
      # ImagePullBackOff for a tag that does not exist.
      - "v*"
      - "service-permissions-v*" # legacy shape (releases up to 0.3.0)
  workflow_dispatch:
    inputs:
      version:
        description: "Release version to publish, for example 0.1.0"
        required: true
        type: string

permissions:
  contents: read
  packages: write

jobs:
  metadata:
    runs-on: ubuntu-latest
    outputs:
      version: ${{ steps.meta.outputs.version }}
      ref: ${{ steps.meta.outputs.ref }}
      commit: ${{ steps.meta.outputs.commit }}
      timestamp: ${{ steps.meta.outputs.timestamp }}
    steps:
      - id: ref
        env:
          EVENT_NAME: ${{ github.event_name }}
          VERSION_INPUT: ${{ inputs.version }}
        run: |
          if [ "${EVENT_NAME}" = "workflow_dispatch" ]; then
            version="${VERSION_INPUT}"
            if [[ ! "${version}" =~ ^[0-9]+\.[0-9]+\.[0-9]+(-[0-9A-Za-z.-]+)?(\+[0-9A-Za-z.-]+)?$ ]]; then
              echo "Invalid release version '${version}'. Expected SemVer, for example 0.1.0." >&2
              exit 1
            fi
            ref="v${version}"
          else
            ref="${GITHUB_REF_NAME}"
            # Accept either tag shape: `service-permissions-v1.2.3` (legacy) or
            # `v1.2.3` (what release-please cuts today).
            version="${ref#service-permissions-v}"
            version="${version#v}"
          fi
          echo "version=${version}" >> "$GITHUB_OUTPUT"
          echo "ref=${ref}" >> "$GITHUB_OUTPUT"
      - uses: actions/checkout@v7
        with:
          ref: ${{ steps.ref.outputs.ref }}
          fetch-depth: 0
      - id: meta
        run: |
          echo "version=${{ steps.ref.outputs.version }}" >> "$GITHUB_OUTPUT"
          echo "ref=${{ steps.ref.outputs.ref }}" >> "$GITHUB_OUTPUT"
          echo "commit=$(git rev-parse HEAD)" >> "$GITHUB_OUTPUT"
          echo "timestamp=$(git show -s --format=%cI HEAD)" >> "$GITHUB_OUTPUT"

  image:
    needs: metadata
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v7
        with:
          ref: ${{ needs.metadata.outputs.ref }}
      - uses: docker/setup-buildx-action@v4
      - uses: docker/login-action@v4
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}
      - uses: docker/metadata-action@v6
        id: meta
        with:
          images: ghcr.io/groundsgg/service-permissions
          tags: |
            type=raw,value=${{ needs.metadata.outputs.version }}
            type=raw,value=latest
      - uses: docker/build-push-action@v7
        with:
          context: .
          push: true
          platforms: linux/amd64
          tags: ${{ steps.meta.outputs.tags }}
          labels: ${{ steps.meta.outputs.labels }}
          build-args: |
            GITHUB_USER=${{ github.actor }}
            BUILD_VERSION=${{ needs.metadata.outputs.version }}
            BUILD_COMMIT=${{ needs.metadata.outputs.commit }}
            BUILD_AT=${{ needs.metadata.outputs.timestamp }}
          secrets: |
            github_token=${{ secrets.GITHUB_TOKEN }}
